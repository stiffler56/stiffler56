<svg width="900" height="480" viewBox="0 0 900 480" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <style>
      .title { font-family: 'Segoe UI', Verdana, sans-serif; font-size: 30px; font-weight: 700; fill: #f8fafc; }
      .label { font-family: 'Segoe UI', Verdana, sans-serif; font-size: 17px; font-weight: 700; fill: #38bdf8; }
      .text { font-family: 'Segoe UI', Verdana, sans-serif; font-size: 16px; fill: #cbd5e1; }
      .chip { font-family: 'Segoe UI', Verdana, sans-serif; font-size: 14px; font-weight: 600; fill: #0f172a; }
      .sub { font-family: 'Segoe UI', Verdana, sans-serif; font-size: 14px; fill: #94a3b8; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="900" height="480" rx="20" fill="url(#bg)"/>
  <rect x="1" y="1" width="898" height="478" rx="19" fill="none" stroke="#334155" stroke-width="1.5"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="900" height="6" rx="3" fill="url(#accent)"/>

  <!-- Header -->
  <text x="50" y="65" class="title">Hey there! 👋</text>
  <text x="50" y="92" class="text">I'm Abdisamad — a Software Engineering student who loves building practical </text>
     <text x="50" y="110" class="text">projects and exploring the world of cybersecurity.</text>
  <line x1="50" y1="112" x2="850" y2="112" stroke="#334155" stroke-width="1"/>

  <!-- Current Focus -->
  <text x="50" y="150" class="label">🎯 Current Focus</text>
  <text x="50" y="176" class="text">Building an app for tracking journals in Firebase.</text>

  <!-- Learning -->
  <text x="50" y="216" class="label">📚 Learning</text>
  <text x="50" y="242" class="text">Networking and Cybersecurity.</text>

  <!-- Skills & Tools -->
  <text x="50" y="282" class="label">🛠️ Skills &amp; Tools</text>

  <!-- Language chips -->
  <g>
    <rect x="50" y="302" width="110" height="38" rx="19" fill="#f7df1e"/>
    <text x="105" y="326" text-anchor="middle" class="chip">JavaScript</text>
  </g>
  <g>
    <rect x="172" y="302" width="70" height="38" rx="19" fill="#00599c"/>
    <text x="207" y="326" text-anchor="middle" class="chip" fill="#f8fafc">C++</text>
  </g>
  <g>
    <rect x="254" y="302" width="150" height="38" rx="19" fill="#e34f26"/>
    <text x="329" y="326" text-anchor="middle" class="chip" fill="#f8fafc">HTML / CSS</text>
  </g>
  <g>
    <rect x="416" y="302" width="110" height="38" rx="19" fill="#ffca28"/>
    <text x="471" y="326" text-anchor="middle" class="chip">Firebase</text>
  </g>

  <!-- Footer -->
  <line x1="50" y1="392" x2="850" y2="392" stroke="#334155" stroke-width="1"/>
  <text x="450" y="427" text-anchor="middle" class="sub" font-style="italic">Check out my bio for social links and ways to connect!</text>

</svg>
